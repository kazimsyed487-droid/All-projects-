<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scientific Calculator</title>
<script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "xko5aps10d");
</script>
<style>
  :root {
    --bg-outer-dark: #0d0d0f;
    --bg-calc-dark: #1c1c1f;
    --bg-display-dark: #141416;
    --gold: #d4af37;
    --gold-soft: #e8c766;
    --text-dark: #f2f2f2;
    --btn-dark: #2b2b30;
    --btn-shadow-dark: rgba(0,0,0,0.6);
    --history-dark: #9a9a9a;

    --bg-outer-light: #eceff3;
    --bg-calc-light: #ffffff;
    --bg-display-light: #f4f6f9;
    --text-light: #1c1c1f;
    --btn-light: #f0f2f5;
    --btn-shadow-light: rgba(0,0,0,0.12);
    --history-light: #8a8a8a;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: var(--bg-outer-dark);
    transition: background 0.4s ease;
    padding: 20px 0;
  }

  body.light { background: var(--bg-outer-light); }

  .calculator {
    background: var(--bg-calc-dark);
    border-radius: 28px;
    padding: 20px;
    width: 360px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    transition: background 0.4s ease;
    position: relative;
  }

  body.light .calculator { background: var(--bg-calc-light); }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .brand {
    color: var(--gold);
    font-weight: 700;
    letter-spacing: 1px;
    font-size: 0.85rem;
  }

  body.light .brand { color: #b8912c; }

  .mode-toggle {
    width: 52px;
    height: 28px;
    border-radius: 20px;
    background: #000;
    border: 1px solid var(--gold);
    cursor: pointer;
    position: relative;
    transition: background 0.3s ease;
  }

  body.light .mode-toggle { background: #dfe3e8; border-color: #b8912c; }

  .mode-toggle .knob {
    position: absolute;
    top: 2px;
    left: 2px;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--gold);
    transition: transform 0.3s ease, background 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
  }

  body.light .mode-toggle .knob {
    transform: translateX(24px);
    background: #b8912c;
  }

  .display {
    background: var(--bg-display-dark);
    border-radius: 16px;
    padding: 18px 16px 14px;
    margin-bottom: 14px;
    text-align: right;
    transition: background 0.4s ease;
  }

  body.light .display { background: var(--bg-display-light); }

  .status-row {
    display: flex;
    justify-content: space-between;
    color: var(--gold-soft);
    font-size: 0.7rem;
    margin-bottom: 4px;
    min-height: 12px;
  }

  .history {
    color: var(--history-dark);
    font-size: 0.95rem;
    min-height: 18px;
    margin-bottom: 4px;
    overflow-x: auto;
    white-space: nowrap;
  }

  body.light .history { color: var(--history-light); }

  .current {
    color: var(--gold);
    font-size: 2rem;
    font-weight: 700;
    overflow-x: auto;
    white-space: nowrap;
  }

  .buttons {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 7px;
  }

  button {
    border: none;
    outline: none;
    font-size: 0.95rem;
    padding: 12px 0;
    border-radius: 12px;
    cursor: pointer;
    background: var(--btn-dark);
    color: var(--text-dark);
    box-shadow: 0 4px 10px var(--btn-shadow-dark);
    position: relative;
    overflow: hidden;
    transition: background 0.3s ease, color 0.3s ease, transform 0.18s cubic-bezier(0.25, 0.9, 0.4, 1), box-shadow 0.25s ease;
  }

  body.light button {
    background: var(--btn-light);
    color: var(--text-light);
    box-shadow: 0 4px 10px var(--btn-shadow-light);
  }

  button.fn {
    font-size: 0.85rem;
    color: var(--gold-soft);
    background: #232327;
  }

  body.light button.fn {
    color: #a67c1e;
    background: #eef0f3;
  }

  button.top-op {
    background: transparent;
    border: 1.5px solid var(--gold);
    color: var(--gold);
  }

  body.light button.top-op {
    border-color: #b8912c;
    color: #b8912c;
    background: transparent;
  }

  button.side-op {
    background: transparent;
    border: 1.5px solid var(--gold);
    color: var(--gold);
    font-size: 1.1rem;
  }

  body.light button.side-op {
    border-color: #b8912c;
    color: #b8912c;
  }

  button.equal {
    background: linear-gradient(145deg, var(--gold), #b8912c);
    color: #1c1c1f;
    font-size: 1.2rem;
    font-weight: 700;
  }

  button.shift-active {
    background: var(--gold);
    color: #1c1c1f;
  }

  button.ac {
    color: #ff6b6b;
    background: #2b2b30;
  }

  body.light button.ac { background: #f0f2f5; }

  button.del {
    color: #7ee3a8;
  }

  /* Press animation */
  button:active {
    transform: scale(0.9);
    transition: transform 0.08s ease;
  }

  button.pulse {
    animation: pulse-anim 0.45s cubic-bezier(0.22, 1, 0.36, 1);
  }

  @keyframes pulse-anim {
    0% { transform: scale(1); box-shadow: 0 4px 10px var(--btn-shadow-dark); }
    30% { transform: scale(0.9); box-shadow: 0 0 0 8px rgba(212,175,55,0.18); }
    65% { transform: scale(1.04); box-shadow: 0 0 0 3px rgba(212,175,55,0.08); }
    100% { transform: scale(1); box-shadow: 0 4px 10px var(--btn-shadow-dark); }
  }

  .signature {
    text-align: center;
    margin-top: 14px;
    font-size: 0.7rem;
    letter-spacing: 0.5px;
    color: var(--gold-soft);
    opacity: 0.75;
  }

  body.light .signature { color: #b8912c; }
</style>
</head>
<body>

<div class="calculator">
  <div class="top-bar">
    <div class="brand">SCI-CALC</div>
    <div class="mode-toggle" id="modeToggle" onclick="toggleMode()">
      <div class="knob" id="knob">☾</div>
    </div>
  </div>

  <div class="display">
    <div class="status-row">
      <span id="shiftIndicator"></span>
      <span id="angleIndicator">DEG</span>
    </div>
    <div class="history" id="history">&nbsp;</div>
    <div class="current" id="current">0</div>
  </div>

  <div class="buttons">
    <!-- Row 1: SHIFT / ALPHA / MODE / DEL / AC -->
    <button class="fn" id="shiftBtn" onclick="toggleShift()">SHIFT</button>
    <button class="fn">ALPHA</button>
    <button class="fn" onclick="toggleAngleMode()">MODE</button>
    <button class="del" onclick="deleteLast()">DEL</button>
    <button class="ac" onclick="clearAll()">AC</button>

    <!-- Row 2: x² √ x³ x⁻¹ xʸ -->
    <button class="fn" onclick="appendValue('^2')">x²</button>
    <button class="fn" onclick="appendValue('√(')">√</button>
    <button class="fn" onclick="appendValue('^3')">x³</button>
    <button class="fn" onclick="appendValue('^(-1)')">x⁻¹</button>
    <button class="fn" onclick="appendValue('^')">xʸ</button>

    <!-- Row 3: sin cos tan log ln -->
    <button class="fn trig" data-normal="sin(" data-shift="asin(" onclick="trigPress(this)">sin</button>
    <button class="fn trig" data-normal="cos(" data-shift="acos(" onclick="trigPress(this)">cos</button>
    <button class="fn trig" data-normal="tan(" data-shift="atan(" onclick="trigPress(this)">tan</button>
    <button class="fn" onclick="appendValue('log(')">log</button>
    <button class="fn" onclick="appendValue('ln(')">ln</button>

    <!-- Row 4: ( ) π e % -->
    <button class="fn" onclick="appendValue('(')">(</button>
    <button class="fn" onclick="appendValue(')')">)</button>
    <button class="fn" onclick="appendValue('π')">π</button>
    <button class="fn" onclick="appendValue('e')">e</button>
    <button class="fn" onclick="appendValue('%')">%</button>

    <!-- Row 5: STO RCL M+ M- MC -->
    <button class="fn" onclick="memStore()">STO</button>
    <button class="fn" onclick="memRecall()">RCL</button>
    <button class="fn" onclick="memAdd()">M+</button>
    <button class="fn" onclick="memSub()">M-</button>
    <button class="fn" onclick="memClear()">MC</button>

    <!-- Row 6: 7 8 9 ÷ Ans -->
    <button onclick="appendValue('7')">7</button>
    <button onclick="appendValue('8')">8</button>
    <button onclick="appendValue('9')">9</button>
    <button class="top-op" onclick="appendValue('÷')">÷</button>
    <button class="fn" onclick="insertAns()">Ans</button>

    <!-- Row 7: 4 5 6 × x! -->
    <button onclick="appendValue('4')">4</button>
    <button onclick="appendValue('5')">5</button>
    <button onclick="appendValue('6')">6</button>
    <button class="top-op" onclick="appendValue('×')">×</button>
    <button class="fn" onclick="appendValue('!')">x!</button>

    <!-- Row 8: 1 2 3 − (-) -->
    <button onclick="appendValue('1')">1</button>
    <button onclick="appendValue('2')">2</button>
    <button onclick="appendValue('3')">3</button>
    <button class="side-op" onclick="appendValue('-')">−</button>
    <button class="fn" onclick="appendValue('-')">(-)</button>

    <!-- Row 9: 0 . EXP + = -->
    <button onclick="appendValue('0')">0</button>
    <button onclick="appendValue('.')">.</button>
    <button class="fn" onclick="appendValue('×10^')">EXP</button>
    <button class="side-op" onclick="appendValue('+')">+</button>
    <button class="equal" onclick="calculate()" style="grid-column: span 1;">=</button>
  </div>

  <div class="signature" id="signature">[SYSTEM.EXE] executed by ⋆𝒌𝒂𝒛𝒊𝒎𐙚</div>
</div>

<script>
  let current = '';
  let history = '';
  let memory = 0;
  let lastAnswer = 0;
  let shiftOn = false;
  let angleMode = 'DEG';

  const currentEl = document.getElementById('current');
  const historyEl = document.getElementById('history');
  const shiftIndicator = document.getElementById('shiftIndicator');
  const angleIndicator = document.getElementById('angleIndicator');
  const shiftBtn = document.getElementById('shiftBtn');

  function updateDisplay() {
    currentEl.textContent = current === '' ? '0' : current;
    historyEl.innerHTML = history === '' ? '&nbsp;' : history;
  }

  function appendValue(val) {
    current += val;
    updateDisplay();
  }

  function clearAll() {
    current = '';
    history = '';
    updateDisplay();
  }

  function deleteLast() {
    current = current.slice(0, -1);
    updateDisplay();
  }

  function toggleShift() {
    shiftOn = !shiftOn;
    shiftBtn.classList.toggle('shift-active', shiftOn);
    shiftIndicator.textContent = shiftOn ? 'SHIFT' : '';
    document.querySelectorAll('.trig').forEach(btn => {
      const base = btn.dataset.normal.replace('(', '');
      btn.textContent = shiftOn ? base + '⁻¹' : base;
    });
  }

  function trigPress(btn) {
    const token = shiftOn ? btn.dataset.shift : btn.dataset.normal;
    appendValue(token);
    if (shiftOn) { shiftOn = false; shiftBtn.classList.remove('shift-active'); shiftIndicator.textContent=''; 
      document.querySelectorAll('.trig').forEach(b => { b.textContent = b.dataset.normal.replace('(',''); });
    }
  }

  function toggleAngleMode() {
    angleMode = angleMode === 'DEG' ? 'RAD' : 'DEG';
    angleIndicator.textContent = angleMode;
  }

  function insertAns() {
    appendValue(String(lastAnswer));
  }

  function memStore() {
    let val = parseFloat(currentEl.textContent) || 0;
    memory = val;
    flashShift('STO');
  }

  function memRecall() {
    appendValue(String(memory));
  }

  function memAdd() {
    let val = parseFloat(currentEl.textContent) || 0;
    memory += val;
    flashShift('M+');
  }

  function memSub() {
    let val = parseFloat(currentEl.textContent) || 0;
    memory -= val;
    flashShift('M-');
  }

  function memClear() {
    memory = 0;
    flashShift('MC');
  }

  function flashShift(label) {
    const old = shiftIndicator.textContent;
    shiftIndicator.textContent = label;
    clearTimeout(flashShift._t);
    flashShift._t = setTimeout(() => { shiftIndicator.textContent = shiftOn ? 'SHIFT' : ''; }, 800);
  }

  // Math helpers
  function toRad(deg) { return deg * Math.PI / 180; }
  function toDeg(rad) { return rad * 180 / Math.PI; }
  function sinD(x) { return angleMode === 'DEG' ? Math.sin(toRad(x)) : Math.sin(x); }
  function cosD(x) { return angleMode === 'DEG' ? Math.cos(toRad(x)) : Math.cos(x); }
  function tanD(x) { return angleMode === 'DEG' ? Math.tan(toRad(x)) : Math.tan(x); }
  function asinD(x) { let r = Math.asin(x); return angleMode === 'DEG' ? toDeg(r) : r; }
  function acosD(x) { let r = Math.acos(x); return angleMode === 'DEG' ? toDeg(r) : r; }
  function atanD(x) { let r = Math.atan(x); return angleMode === 'DEG' ? toDeg(r) : r; }
  function factorial(n) {
    n = Number(n);
    if (n < 0 || !Number.isFinite(n)) return NaN;
    if (Math.floor(n) !== n) return NaN;
    let r = 1;
    for (let i = 2; i <= n; i++) r *= i;
    return r;
  }

  function toEvalString(expr) {
    let e = expr;
    e = e.replace(/π/g, '(Math.PI)');
    e = e.replace(/(?<![a-zA-Z])e(?![a-zA-Z(])/g, '(Math.E)');
    e = e.replace(/\^/g, '**');
    e = e.replace(/×/g, '*');
    e = e.replace(/÷/g, '/');
    e = e.replace(/√\(/g, 'Math.sqrt(');
    e = e.replace(/(?<!a)sin\(/g, 'sinD(');
    e = e.replace(/(?<!a)cos\(/g, 'cosD(');
    e = e.replace(/(?<!a)tan\(/g, 'tanD(');
    e = e.replace(/asinD?\(/g, 'asinD(');
    e = e.replace(/acosD?\(/g, 'acosD(');
    e = e.replace(/atanD?\(/g, 'atanD(');
    e = e.replace(/log\(/g, 'Math.log10(');
    e = e.replace(/ln\(/g, 'Math.log(');
    e = e.replace(/(\d+(\.\d+)?)!/g, 'factorial($1)');
    e = e.replace(/%/g, '/100');
    return e;
  }

  function calculate() {
    if (current === '') return;
    try {
      let expr = toEvalString(current);
      let result = eval(expr);
      if (typeof result === 'number' && !Number.isInteger(result)) {
        result = Math.round(result * 1e10) / 1e10;
      }
      history = current;
      current = String(result);
      lastAnswer = result;
    } catch (e) {
      current = 'Error';
    }
    updateDisplay();
  }

  // Button press pulse animation
  document.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      btn.classList.remove('pulse');
      void btn.offsetWidth;
      btn.classList.add('pulse');
    });
  });

  // Light / dark mode toggle
  function toggleMode() {
    document.body.classList.toggle('light');
    const knob = document.getElementById('knob');
    knob.textContent = document.body.classList.contains('light') ? '☀' : '☾';
  }
</script>

</body>
</html>
